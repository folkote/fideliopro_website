version: "3.8"

services:
  fideliopro:
    build: .
    container_name: fideliopro_app
    restart: unless-stopped
    ports:
      - "7080:7080"
    volumes:
      - //10.0.0.10/ai_fidelio/fidelio_pro_website_cache:/app/data
    environment:
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=7080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7080/health/json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
