services:
  fideliopro:
    build: .
    container_name: fideliopro_app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
    environment:
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=80
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health/json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
